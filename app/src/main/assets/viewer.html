<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="katex.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #24292f;
      --text-secondary: #57606a;
      --primary: #0969da;
      --code-bg: #f6f8fa;
      --code-inline: rgba(175,184,193,0.2);
      --border: #d0d7de;
      --link: #0969da;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 0 8px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      word-wrap: break-word;
    }
    pre {
      background: var(--code-bg);
      padding: 16px;
      overflow-x: auto;
      border-radius: 6px;
    }
    code {
      background: var(--code-inline);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 85%;
    }
    pre code { background: none; padding: 0; font-size: 100%; }
    img { max-width: 100%; height: auto; }
    table { border-collapse: collapse; width: 100%; overflow-x: auto; display: block; }
    th, td { border: 1px solid var(--border); padding: 6px 13px; }
    th { background: var(--code-bg); }
    blockquote { border-left: 4px solid var(--border); margin: 0; padding-left: 16px; color: var(--text-secondary); }
    a { color: var(--link); text-decoration: none; }
    .katex-display { overflow-x: auto; overflow-y: hidden; padding: 8px 0; }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      opacity: 0.85;
    }
    .welcome h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.02em;
    }
    .welcome em {
      font-size: 1rem;
      color: var(--text-secondary);
    }
  </style>
  <script>
    // Apply M3 theme before first paint — eliminates white flash.
    try {
      var _t = JSON.parse(Theme.getThemeColors());
      var _r = document.documentElement;
      for (var _k in _t) { if (_t.hasOwnProperty(_k)) _r.style.setProperty(_k, _t[_k]); }
    } catch(e) { /* Theme bridge not ready yet — fallback to CSS :root defaults */ }
  </script>
</head>
<body>
  <div id="content"><div class="welcome"><h1>OpenMarkdown</h1><em>render .md files, html and latex support</em></div></div>
  <script src="katex.min.js"></script>
  <script src="mhchem.min.js"></script>
  <script src="markdown-it-14.min.js"></script>
  <script>
    window.md = window.markdownit({html: true, linkify: true, typographer: true});

    // Invisible placeholder so markdown-it never sees raw math delimiters or KaTeX HTML.
    // Teammates: markdown-it parses _ and * as emphasis; feeding it KaTeX HTML breaks tags.
    var MATH_PLACEHOLDER = '\uFFFC';
    var mathCache = [];

    function protectMath(tex, displayMode) {
      var idx = mathCache.length;
      mathCache.push({tex: tex.trim(), displayMode: displayMode});
      return MATH_PLACEHOLDER + idx + MATH_PLACEHOLDER;
    }

    function renderMarkdown(text) {
      console.log('renderMarkdown called, length=' + (text ? text.length : 0));
      if (!text) {
        document.getElementById('content').innerHTML = '<div class="welcome"><h1>OpenMarkdown</h1><em>render .md files, html and latex support</em></div>';
        return;
      }

      mathCache = [];

      // Replace $$...$$ and $...$ with placeholders BEFORE markdown-it runs.
      // This prevents markdown-it from seeing underscores/asterisks inside math.
      var processed = text
        .replace(/\$\$([\s\S]*?)\$\$/g, function(_, tex) { return protectMath(tex, true); })
        .replace(/\$([^\$\n]+?)\$/g, function(_, tex) { return protectMath(tex, false); });

      var html = window.md.render(processed);

      // Swap placeholders back for rendered KaTeX HTML.
      html = html.replace(new RegExp(MATH_PLACEHOLDER + '(\\d+)' + MATH_PLACEHOLDER, 'g'),
        function(_, idx) {
          var m = mathCache[parseInt(idx)];
          if (!m) return '';
          return katex.renderToString(m.tex, {throwOnError: false, displayMode: m.displayMode});
        });

      document.getElementById('content').innerHTML = html;
      injectHeadingIds();
      console.log('renderMarkdown done, math blocks=' + mathCache.length);
    }

    function injectHeadingIds() {
      var headings = document.querySelectorAll('#content h1,#content h2,#content h3,#content h4,#content h5,#content h6');
      for (var i = 0; i < headings.length; i++) {
        headings[i].id = 'toc-' + i;
      }
    }

    function updateActiveHeading() {
      var headings = document.querySelectorAll('#content [id^="toc-"]');
      for (var i = headings.length - 1; i >= 0; i--) {
        if (headings[i].getBoundingClientRect().top <= 100) {
          try { Android.onHeadingChanged(i); } catch(e) {}
          return;
        }
      }
    }
    window.addEventListener('scroll', updateActiveHeading, {passive: true});

    function scrollToHeading(n) {
      var el = document.getElementById('toc-' + n);
      if (el) {
        el.scrollIntoView({behavior: 'smooth', block: 'start'});
      }
    }

    function applyThemeColors(colors) {
      var root = document.documentElement;
      for (var key in colors) {
        if (colors.hasOwnProperty(key)) {
          root.style.setProperty(key, colors[key]);
        }
      }
    }

    function renderFromAndroid() {
      console.log('renderFromAndroid called');
      try {
        var text = AndroidBridge.getContent();
        console.log('renderFromAndroid got content, length=' + (text ? text.length : 0));
        renderMarkdown(text);
      } catch (e) {
        console.error('renderFromAndroid failed: ' + e.message);
        document.getElementById('content').innerHTML = '<p style="color:red">Error loading content</p>';
      }
    }
  </script>
</body>
</html>
